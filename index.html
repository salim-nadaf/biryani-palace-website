<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- Preconnect to font origins - MUST be first for maximum effect -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="dns-prefetch" href="https://fonts.googleapis.com">
    <link rel="dns-prefetch" href="https://fonts.gstatic.com">
    
    <title>Biryani Palace - Authentic & Tasty Biryani for Families</title>
    <link rel="icon" href="/favicon.png" type="image/png">
    <meta name="description" content="Experience authentic biryani at Biryani Palace. Fresh ingredients, traditional recipes, perfect for families. Order now!" />
    <meta name="author" content="Biryani Palace" />
    <meta name="robots" content="index, follow">
    <meta name="theme-color" content="#d4af37">
    
    <!-- Preload critical fonts directly to reduce CLS -->
    <link rel="preload" as="font" type="font/woff2" href="https://fonts.gstatic.com/s/alata/v12/PbytFmztEwbIoce9zqYzQ1OW.woff2" crossorigin>
    <link rel="preload" as="font" type="font/woff2" href="https://fonts.gstatic.com/s/montserrat/v31/JTUSjIg1_i6t8kCHKm459WlhyyTh89Y.woff2" crossorigin>
    <link rel="preload" as="font" type="font/woff2" href="https://fonts.gstatic.com/s/allura/v23/9oRPNYsQpS4zjuA_iwgWHNn7GQ.woff2" crossorigin>
    
    <!-- Critical inline styles for instant render with font fallbacks -->
    <style>
      *{box-sizing:border-box;margin:0;padding:0}
      html{height:100%;contain:layout style}
      body{min-height:100%;background:#000;color:#f2f2f2;font-family:system-ui,-apple-system,sans-serif;contain:layout style}
      #root{min-height:100vh;display:flex;flex-direction:column;contain:layout style}
      /* Font fallback metrics to reduce CLS */
      @font-face{font-family:'Alata-fallback';src:local('Arial');size-adjust:105%;ascent-override:95%;descent-override:25%;line-gap-override:0%}
      @font-face{font-family:'Montserrat-fallback';src:local('Arial');size-adjust:112%;ascent-override:85%;descent-override:22%;line-gap-override:0%}
      @font-face{font-family:'Allura-fallback';src:local('Brush Script MT');size-adjust:115%;ascent-override:90%;descent-override:30%;line-gap-override:0%}
      .font-alata{font-family:Alata,'Alata-fallback',system-ui,sans-serif}
      .font-montserrat{font-family:Montserrat,'Montserrat-fallback',system-ui,sans-serif}
      .font-allura{font-family:Allura,'Allura-fallback',cursive}
    </style>
    
    <!-- Load Google Fonts asynchronously to prevent render blocking -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&family=Alata&family=Allura&display=optional" media="print" onload="this.media='all'">
    <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&family=Alata&family=Allura&display=optional"></noscript>

    <meta property="og:title" content="Biryani Palace - Best Biryani in Kalyan" />
    <meta property="og:description" content="Experience authentic biryani at Biryani Palace. Fresh ingredients, traditional recipes, perfect for families." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="https://lovable.dev/opengraph-image-p98pqg.png" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@lovable_dev" />
    <meta name="twitter:image" content="https://lovable.dev/opengraph-image-p98pqg.png" />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
